<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de IDs - Interfaz Completa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet"> 

<style>
:root {
    --bg-dark: #1e1e1e;
    --bg-card: #2c2c2c;
    --text-light: #f5f5f5; /* Blanco casi puro */
    --accent-blue: #007bff;
    --accent-hover: #0056b3;
    --accent-red: #dc3545; 
    --accent-green: #28a745;
    --border-color: #444;
    --font-main: 'Helvetica Neue', Arial, sans-serif; 
    --font-data: 'Roboto Mono', monospace;
    --highlight-row: #3a3a3a; 
}

/* General */
body {
    font-family: var(--font-main);
    background-color: var(--bg-dark);
    color: var(--text-light);
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-y: hidden;
    font-size: 1rem;
}

/* Header */
.header {
    background-color: #2c2c2c;
    text-align: center;
    padding: 15px 10px;
    border-bottom: 2px solid var(--accent-blue);
    font-family: var(--font-main);
}
.header h1 {
    margin: 0;
    font-size: 2.2em;
    color: var(--accent-blue);
}

/* Search */
.search-container {
    padding: 20px 10px; 
    background-color: #1e1e1e;
    text-align: center;
}
.search-input-group {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}
#idInput {
    padding: 12px 18px; 
    width: 380px;
    max-width: 50%; 
    border: 1px solid var(--border-color);
    background-color: #333;
    color: var(--text-light);
    font-family: var(--font-data);
    font-size: 1.1em; 
}
.search-container button {
    padding: 12px 18px; 
    /* Base style for all search buttons */
    color: var(--text-light);
    border: none;
    cursor: pointer;
    font-family: var(--font-main);
    font-size: 1.05em; 
    /* Animación para el efecto de brillo */
    transition: background-color 0.2s, outline 0.2s, transform 0.2s; 
    border-radius: 4px; /* Asegurar que tienen borde redondeado para el outline */
}

/* BOTÓN BUSCAR ID (AZUL) */
.search-container button:not(#limpiarBtn) {
    background-color: var(--accent-blue);
}
.search-container button:not(#limpiarBtn):hover { 
    background-color: var(--accent-hover); 
    /* Efecto de brillo: un outline azul claro */
    outline: 2px solid rgba(0, 123, 255, 0.7); 
    outline-offset: 2px;
    transform: translateY(-1px); /* Ligero movimiento hacia arriba */
}

/* Botón Limpiar (GRIS) */
#limpiarBtn {
    background-color: #6c757d; 
}
#limpiarBtn:hover {
    background-color: #5a6268;
    /* Efecto de brillo: un outline gris claro */
    outline: 2px solid rgba(108, 117, 125, 0.7); 
    outline-offset: 2px;
    transform: translateY(-1px);
}

/* Main Layout */
.content-wrapper {
    display: flex;
    justify-content: center;
    align-items: stretch;
    gap: 25px;
    padding: 0 30px 30px;
    flex-grow: 1;
}

/* Cards */
.info-card, .map-card {
    width: 45%;
    max-width: 600px;
    background-color: var(--bg-card);
    padding: 18px; 
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 200px); 
    min-height: 400px; 
}
.info-card h2, .map-card h2 {
    color: var(--accent-blue);
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 10px;
    margin-bottom: 12px;
    font-size: 1.6em; 
    display: flex; /* Nuevo: para alinear el título y el botón de distancia */
    justify-content: space-between;
    align-items: center;
}

/* --- ESTILO DE LA TABLA DE DATOS --- */
.data-table {
    background-color: #333;
    padding: 10px; 
    border-radius: 4px;
    flex-grow: 1;
    overflow-y: auto; 
    max-height: 100%;
}
/* Estilo para los mensajes de estado (centrado y color) */
.data-table .status-message {
    text-align: center;
    font-size: 1.1em;
    padding: 10px;
    margin: 0;
}
.data-table .status-success {
    color: var(--accent-green);
}
.data-table .status-loading {
    color: var(--accent-blue);
}

.data-row {
    display: flex;
    border-bottom: 1px solid #3c3c3c;
    padding: 10px 5px; 
    font-family: var(--font-data);
    font-size: 1em; 
    transition: background-color 0.15s; 
}
.data-row:last-child { border-bottom: none; }
.data-row:hover { background-color: var(--highlight-row); }
.data-label { width: 45%; font-weight: bold; color: var(--accent-blue); }
.data-value { width: 55%; color: var(--text-light); word-break: break-word; }

/* --- COORDENADAS DEBAJO DEL ID (SOLO MÓVIL) --- */
.mobile-coords {
    display: none; /* OCULTO EN ESCRITORIO */
    background-color: var(--accent-blue);
    color: white;
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 1.1em;
    font-family: var(--font-data);
    margin: 5px 0 10px 0;
    text-align: center;
}

/* Map */
#mapa {
    background-color: #000;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    flex-grow: 1;
    min-height: 150px;
    margin-bottom: 12px; 
}

/* OCULTAR TODO EL MAP-FOOTER POR DEFECTO */
#mapaInfo {
    display: none; 
    background-color: #333;
    padding: 12px; 
    border-radius: 4px;
    font-size: 1em; 
    font-family: var(--font-main);
    flex-direction: column;
}
#mapaInfo.visible {
    display: flex; /* Mostrar cuando se aplica la clase visible */
}

.map-footer p {
    margin: 4px 0; 
}

/* --- ESTILO DE MARCATEXTOS (FONDO DE COLOR Y LETRAS BLANCAS) --- */
.highlight-text {
    font-weight: bold;
    color: white !important; 
    padding: 3px 6px; 
    border-radius: 4px; 
    line-height: 1.5; 
}
.coord-original { background-color: var(--accent-blue); }
.coord-nueva { background-color: var(--accent-red); }
#coordenadas-line p,
#coordenadas-nueva-line p {
    font-size: 1.2em; 
}
/* --- FIN ESTILO MARCATEXTOS --- */

/* --- GRUPO DE INPUT Y BOTÓN DE COMPARACIÓN --- */
.coord-input-group {
    display: flex;
    margin-top: 10px; 
    gap: 8px; 
}
#coordInput {
    padding: 10px 12px; 
    flex-grow: 1; 
    border: 1px solid var(--border-color);
    background-color: #444;
    color: var(--text-light);
    font-family: var(--font-data);
    font-size: 1em; 
    box-sizing: border-box;
}
#compararBtn {
    padding: 10px 18px; 
    background-color: var(--accent-red);
    color: white;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    font-size: 1em; 
    cursor: pointer;
    transition: background-color 0.2s, outline 0.2s, transform 0.2s; /* Se añadió outline y transform */
}
#compararBtn:hover {
    background-color: #a02030;
    /* Efecto de brillo: un outline rojo claro */
    outline: 2px solid rgba(220, 53, 69, 0.7); 
    outline-offset: 2px;
    transform: translateY(-1px);
}

/* --- FIN GRUPO DE INPUT --- */

/* --- BOTÓN DE DISTANCIA MOVIDO AL TÍTULO (PUNTO 2) --- */
#reubicacion-btn-header {
    display: none; /* Oculto por defecto */
    padding: 6px 12px; 
    background-color: var(--accent-red);
    color: white;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    font-size: 0.7em; /* Pequeño para encajar en el título */
    cursor: default;
    /* Ajustes visuales para el título */
    align-self: flex-end;
    margin-bottom: -5px;
    transition: background-color 0.2s;
}

.map-info-line {
    display: flex;
    justify-content: space-between; 
    align-items: center;
    margin: 4px 0; 
}

/* ---------------- RESPONSIVE ADAPTIVE SIZING ---------------- */
@media (max-width: 1000px) {
    body { overflow-y: auto; }
    .content-wrapper {
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 0 15px 30px;
    }
    .info-card, .map-card {
        width: 100%;
        height: auto;
        min-height: auto;
    }
    .data-table { max-height: 350px; } 
    .search-input-group { flex-wrap: wrap; }
    #idInput { width: 90%; max-width: 100%; }
    .search-container button { margin: 8px 5px 0; flex-grow: 1; max-width: 45%; } 
    .coord-input-group { flex-direction: column; }
    #coordInput, #compararBtn { width: 100%; }

    /* Muestra las coordenadas originales solo en móvil */
    .mobile-coords {
        display: block; 
    }
}
@media (min-width: 1001px) {
    /* Asegurar que esté oculto en PC */
    .mobile-coords {
        display: none !important; 
    }
}
@media (max-width: 800px) {
    .data-row { font-size: 0.9em; padding: 6px 0; } 
    #mapa { min-height: 250px; } 
}
@media (max-width: 600px) {
    .header h1 { font-size: 1.8em; } 
    .data-row { font-size: 0.85em; } 
    .map-info-line { flex-direction: column; align-items: flex-start; }
}

/* --- ESTILO POP-UP OSCURO --- */
/* Contenedor principal del Pop-up */
.leaflet-popup-content-wrapper {
    background-color: var(--bg-card) !important; /* Fondo oscuro */
    color: var(--text-light) !important; /* Texto claro (blanco) */
    box-shadow: 0 3px 14px rgba(0, 0, 0, 0.8); /* Sombra más oscura */
    border-radius: 6px;
}

/* La 'cola' o flecha del pop-up */
.leaflet-popup-tip {
    background-color: var(--bg-card) !important; /* La cola también debe ser oscura */
}

/* Contenido interno (para asegurar que los enlaces/textos son claros) */
.leaflet-popup-content {
    font-size: 1em;
    font-family: var(--font-main);
}

/* Asegurar que el título (strong) se vea bien */
.leaflet-popup-content strong {
    color: var(--text-light); /* Ahora es completamente blanco */
    font-weight: bold;
}
/* --- FIN ESTILO POP-UP OSCURO --- */

</style>
</head>

<body>
<header class="header">
    <h1>GEOLOCALIZADOR DE TOTEMS</h1> </header>

<div class="search-container">
    <div class="search-input-group">
        <input type="text" id="idInput" placeholder="ID de Búsqueda..." onkeyup="if(event.key === 'Enter') buscarID()">
        <button onclick="buscarID()">BUSCAR ID</button>
        <button id="limpiarBtn" onclick="limpiarTodo()">LIMPIAR</button>
    </div>
</div>

<main class="content-wrapper">
    <section class="info-card">
        <h2>DATOS DEL TOTEM</h2> <div id="infoTotem" class="data-table">
            <p class="status-message status-loading">Cargando base de datos...</p>
        </div>
    </section>

    <section class="map-card">
        <h2>
            UBICACIÓN GEOGRÁFICA
            <span id="reubicacion-btn-header" style="display:none;"></span>
        </h2>
        <div id="mapa"></div>
        
        <div id="mapaInfo" class="map-footer">
            <div id="ubicacion-line" class="map-info-line">
                <p>Ubicación: [PENDIENTE]</p>
            </div>
            <div id="coordenadas-line" class="map-info-line">
                <p><span class="coord-original highlight-text">Coordenadas (Original)</span>: [PENDIENTE]</p>
            </div>
            
            <div id="coordenadas-nueva-line" class="map-info-line" style="display:none;">
                <p><span class="coord-nueva highlight-text">Coordenadas (Nuevas)</span>: [PENDIENTE]</p>
            </div>

            <div class="coord-input-group">
                <input type="text" id="coordInput" placeholder="Coordenadas de Reubicación (Lat,Lon)">
                <button id="compararBtn" onclick="compararCoordenadas()">COMPARAR</button>
            </div>
        </div>
    </section>
</main>

<footer class="footer">
    </footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let totemData = [], map = null, markerOriginal = null, markerNew = null, polyline = null;
let currentActiveData = null; 
const DATA_URL = "https://raw.githubusercontent.com/lazerboy404/buscador-totems/main/csvjson.json";

document.addEventListener('DOMContentLoaded', async () => {
    map = L.map('mapa').setView([19.4326, -99.1332], 12); 
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="http://osm.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    await cargarDatos();
});

async function cargarDatos() {
    const info = document.getElementById('infoTotem');
    info.innerHTML = `<p class="status-message status-loading">CARGANDO BASE DE DATOS...</p>`;
    try {
        const r = await fetch(DATA_URL);
        if (!r.ok) throw new Error();
        totemData = await r.json();
        info.innerHTML = `<p class="status-message status-success">DATOS CARGADOS. Ingrese un ID.</p>`;
    } catch {
        info.innerHTML = `<p class="status-message" style="color:red;">Error al cargar datos.</p>`;
    }
}

// Haversine formula
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; 
    const dLat = (lat2 - lat1) * (Math.PI / 180);
    const dLon = (lon2 - lon1) * (Math.PI / 180);
    const a = 
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c; // Distancia en km
}


function buscarID() {
    const id = document.getElementById('idInput').value.trim().toUpperCase();
    const info = document.getElementById('infoTotem');
    
    // MEJORA: Limpiar el campo de coordenadas de reubicación y sus indicadores
    document.getElementById('coordInput').value = ''; 
    
    limpiarMapa(false); 
    currentActiveData = null; 

    if (!id) { info.innerHTML = `<p class="status-message">Ingrese un ID.</p>`; return; }
    
    // Búsqueda flexible
    let normalizedId = id;
    if (!id.startsWith('MC')) {
        normalizedId = 'MC' + id;
    }
    const searchId = normalizedId; 
    
    const data = totemData.find(d => d.ID === searchId || d.id === searchId);
    
    if (!data) {
        info.innerHTML = `<p class="status-message" style="color:red;">ID ${id} no encontrado.</p>`;
        document.getElementById('mapaInfo').classList.remove('visible'); 
        actualizarInfoMapa(null, null, null, null); 
        return;
    }
    
    currentActiveData = data; 
    
    document.getElementById('mapaInfo').classList.add('visible'); 

    const coordsStr = document.getElementById('coordInput').value.trim(); 
    
    mostrarInformacion(data, info); 
    actualizarMapa(data, coordsStr || null);
}


function compararCoordenadas() {
    if (!currentActiveData) {
        document.getElementById('infoTotem').innerHTML = `<p class="status-message" style="color:red;">Error: Busque un ID primero.</p>`;
        return;
    }
    
    const coordsStr = document.getElementById('coordInput').value.trim(); 
    
    limpiarMarcadoresYPolilinea(); 
    mostrarInformacion(currentActiveData, document.getElementById('infoTotem'));
    actualizarMapa(currentActiveData, coordsStr);
}

function limpiarTodo() {
    document.getElementById('idInput').value = '';
    document.getElementById('coordInput').value = '';
    
    limpiarMapa(true); 
    document.getElementById('infoTotem').innerHTML = `<p class="status-message status-success">DATOS CARGADOS. Ingrese un ID.</p>`;
    document.getElementById('mapaInfo').classList.remove('visible'); 
}

function limpiarMarcadoresYPolilinea() {
    if (markerNew) map.removeLayer(markerNew);
    if (polyline) map.removeLayer(polyline);
    markerNew = null;
    polyline = null;
    
    document.getElementById('reubicacion-btn-header').style.display = 'none'; 
    
    if (currentActiveData) {
        const ubicacion = `${currentActiveData.COLONIA || 'N/A'}, ${currentActiveData.ALCALDIA || 'N/A'}`;
        const orig_coords_str = `${(currentActiveData.LATITUD || currentActiveData.latitud || currentActiveData.Latitude).toFixed(6)}, ${(currentActiveData.LONGITUD || currentActiveData.longitud || currentActiveData.Longitude).toFixed(6)}`;
        actualizarInfoMapa(ubicacion, orig_coords_str, null, "0 m");
    }

    if (markerOriginal) {
         markerOriginal.openPopup();
    }
}

function limpiarMapa(clearInputs = false) {
    if (markerOriginal) map.removeLayer(markerOriginal);
    if (markerNew) map.removeLayer(markerNew);
    if (polyline) map.removeLayer(polyline);
    markerOriginal = null;
    markerNew = null;
    polyline = null;
    currentActiveData = null;
    
    document.getElementById('reubicacion-btn-header').style.display = 'none'; 
    
    if (clearInputs) {
        actualizarInfoMapa("PENDIENTE", "PENDIENTE", null, null);
    } else {
        actualizarInfoMapa("PENDIENTE", "PENDIENTE", null, null);
        map.setView([19.4326, -99.1332], 12);
    }
}

function actualizarInfoMapa(ubicacion, orig_coords, new_coords, distancia) {
    const ubicacionLine = document.getElementById('ubicacion-line');
    const coordenadasLine = document.getElementById('coordenadas-line');
    const coordNuevaLine = document.getElementById('coordenadas-nueva-line');
    const btnHeader = document.getElementById('reubicacion-btn-header');

    // 1. Ubicación
    ubicacionLine.innerHTML = `<p>Ubicación: ${ubicacion || '[NO ENCONTRADA]'}</p>`;

    // 2. Coordenadas Originales (Azul)
    coordenadasLine.innerHTML = `<p><span class="coord-original highlight-text">Coordenadas (Original)</span>: ${orig_coords || '[NO ENCONTRADA]'}</p>`;
    
    // 3. Coordenadas Nuevas (Rojo)
    if (new_coords) {
        coordNuevaLine.innerHTML = `<p><span class="coord-nueva highlight-text">Coordenadas (Nuevas)</span>: ${new_coords}</p>`;
        coordNuevaLine.style.display = 'flex'; 
    } else {
        coordNuevaLine.style.display = 'none'; 
    }
    
    // 4. Distancia de Reubicación (Botón en Header)
    if (distancia && distancia !== "0 m" && distancia !== "N/A" && new_coords) {
        btnHeader.textContent = `REUBICACIÓN: ${distancia}`;
        btnHeader.style.display = 'inline-block';
    } else {
        btnHeader.style.display = 'none';
    }
    
    // 5. Muestra Coordenadas Originales en MÓVIL (CAMBIO 3)
    const infoTotem = document.getElementById('infoTotem');
    let mobileCoordDiv = infoTotem.querySelector('.mobile-coords');
    if (!mobileCoordDiv) {
        mobileCoordDiv = document.createElement('div');
        mobileCoordDiv.className = 'mobile-coords';
        infoTotem.insertBefore(mobileCoordDiv, infoTotem.firstChild); 
    }
    if (orig_coords && orig_coords !== "PENDIENTE") {
        mobileCoordDiv.innerHTML = `Coordenadas: ${orig_coords}`; /* Texto cambiado de 'Base' a 'Coordenadas' */
        mobileCoordDiv.style.display = 'block'; 
    } else {
        mobileCoordDiv.style.display = 'none';
    }
}


function mostrarInformacion(data, cont) {
    let html = '';
    
    const excl = ['LATITUD','LONGITUD','latitud','longitud','Latitude','Longitude'];
    
    for (const k in data) {
        if (excl.includes(k)) continue; 
        
        html += `<div class="data-row">
            <div class="data-label">${k.replace('_',' ')}</div>
            <div class="data-value">${data[k]}</div></div>`;
    }
    
    const mobileCoordDiv = cont.querySelector('.mobile-coords');
    cont.innerHTML = html;
    if (mobileCoordDiv) {
        cont.insertBefore(mobileCoordDiv, cont.firstChild);
    }
}

function actualizarMapa(d, coordsStr) {
    const orig_lat = parseFloat(d.LATITUD || d.latitud || d.Latitude);
    const orig_lon = parseFloat(d.LONGITUD || d.longitud || d.Longitude);
    
    // Obtener el ID para mostrarlo en los pop-ups del mapa
    const activoID = d.ID || d.id || 'N/A';
    
    const ubicacion = `${d.COLONIA || 'N/A'}, ${d.ALCALDIA || 'N/A'}`;
    const orig_coords_str = `${orig_lat.toFixed(6)}, ${orig_lon.toFixed(6)}`;
    let new_coords_str = null;
    let distanceDisplay = "0 m";

    if (isNaN(orig_lat) || isNaN(orig_lon)) { 
        actualizarInfoMapa(ubicacion, "N/A", null, null);
        return; 
    }

    // 1. Crear marcador original si no existe
    if (!markerOriginal) {
        // CORRECCIÓN DEL ANCLAJE DEL PIN AZUL
        const blueIcon = new L.Icon({
            iconUrl: 'https://unpkg.com/leaflet/dist/images/marker-icon.png',
            shadowUrl: 'https://unpkg.com/leaflet/dist/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41], // Clave para alinear la línea al pico del pin azul
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        markerOriginal = L.marker([orig_lat, orig_lon], { icon: blueIcon })
            .addTo(map)
            .bindPopup(`<strong>${activoID}</strong><br><span style="color: #007bff;">UBICACIÓN ORIGINAL</span><br>${orig_coords_str}`)
            .openPopup();
         map.setView([orig_lat, orig_lon], 15);
    }
    
    let bounds = [
        [orig_lat, orig_lon]
    ];
    let focusPoint = [orig_lat, orig_lon];

    // 2. Procesar coordenadas nuevas
    if (coordsStr) {
        const [new_lat_str, new_lon_str] = coordsStr.split(',');
        const new_lat = parseFloat(new_lat_str);
        const new_lon = parseFloat(new_lon_str);

        if (!isNaN(new_lat) && !isNaN(new_lon)) {
            
            const redIcon = new L.Icon({
                iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
                shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                iconSize: [25, 41],
                iconAnchor: [12, 41],
                popupAnchor: [1, -34],
                shadowSize: [41, 41]
            });
            
            new_coords_str = `${new_lat.toFixed(6)}, ${new_lon.toFixed(6)}`;

            // Crear marcador nuevo
            markerNew = L.marker([new_lat, new_lon], { icon: redIcon })
                .addTo(map)
                .bindPopup(`<strong>${activoID}</strong><br><span style="color: #dc3545;">UBICACIÓN NUEVA</span><br>${new_coords_str}`).openPopup();
            
            // 3. Dibujar Polilínea
            const latlngs = [
                [orig_lat, orig_lon],
                [new_lat, new_lon]
            ];
            polyline = L.polyline(latlngs, {color: 'red', weight: 4, opacity: 0.7}).addTo(map);

            // 4. Calcular Distancia
            const distanceKm = getDistance(orig_lat, orig_lon, new_lat, new_lon);
            const distanceM = distanceKm * 1000;
            distanceDisplay = distanceKm < 0.05 ? `${distanceM.toFixed(2)} m` : `${distanceKm.toFixed(2)} km`; 

            // Ajustar el foco del mapa para incluir ambos puntos
            bounds.push([new_lat, new_lon]);
            map.fitBounds(bounds, { padding: [50, 50] });
            focusPoint = null; 
        }
    } else {
        // Si no hay coordsStr, asegurarse de que solo se muestre el punto original
        limpiarMarcadoresYPolilinea(); 
        if (markerOriginal) {
            map.setView([orig_lat, orig_lon], 15);
        }
    }

    // 5. Actualizar Info Footer
    actualizarInfoMapa(ubicacion, orig_coords_str, new_coords_str, distanceDisplay);
    
    setTimeout(() => map.invalidateSize(), 100);
}
</script>
</body>
</html>
