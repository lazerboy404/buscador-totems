<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de IDs - Interfaz Completa</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet"> 

<style>
:root {
    --bg-dark: #1e1e1e;
    --bg-card: #2c2c2c;
    --text-light: #f5f5f5; /* Blanco casi puro */
    --accent-blue: #007bff;
    --accent-hover: #0056b3;
    --accent-red: #dc3545; 
    --accent-red-intense: #D32F2F; /* Rojo más intenso */
    --accent-green: #28a745; 
    --accent-yellow-vibrant: #F3C427; /* <<< MODIFICADO AL NUEVO TONO */
    --border-color: #444;
    --font-main: 'Helvetica Neue', Arial, sans-serif; 
    --font-data: 'Roboto Mono', monospace;
    --highlight-row: #3a3a3a; 

    /* COLORES DE PROVEEDORES */
    --color-telmex: #007bff; /* Azul */
    --color-omnia: #ff8c00; /* Naranja */
}

/* General */
body {
    font-family: var(--font-main);
    background-color: var(--bg-dark);
    color: var(--text-light);
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow-y: hidden;
    font-size: 1rem;
}

/* Header */
.header {
    background-color: #2c2c2c;
    text-align: center;
    padding: 15px 10px;
    border-bottom: 2px solid var(--accent-blue);
    font-family: var(--font-main);
}
.header h1 {
    margin: 0;
    font-size: 2.2em;
    color: var(--accent-blue);
}

/* Search */
.search-container {
    padding: 20px 10px; 
    background-color: #1e1e1e;
    text-align: center;
}
.search-input-group {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}
#idInput {
    padding: 12px 18px; 
    width: 380px;
    max-width: 50%; 
    border: 1px solid var(--border-color);
    background-color: #333;
    color: var(--text-light);
    font-family: var(--font-data);
    font-size: 1.1em; 
}
.search-container button {
    padding: 12px 18px; 
    color: var(--text-light);
    border: none;
    cursor: pointer;
    font-family: var(--font-main);
    font-size: 1.05em; 
    transition: background-color 0.2s, outline 0.2s, transform 0.2s; 
    border-radius: 4px; 
}

/* BOTÓN BUSCAR ID (AZUL) */
.search-container button:not(#limpiarBtn) {
    background-color: var(--accent-blue);
}
.search-container button:not(#limpiarBtn):hover { 
    background-color: var(--accent-hover); 
    outline: 2px solid rgba(0, 123, 255, 0.7); 
    outline-offset: 2px;
    transform: translateY(-1px); 
}

/* Botón Limpiar (GRIS) */
#limpiarBtn {
    background-color: #6c757d; 
}
#limpiarBtn:hover {
    background-color: #5a6268;
    outline: 2px solid rgba(108, 117, 125, 0.7); 
    outline-offset: 2px;
    transform: translateY(-1px);
}

/* Main Layout */
.content-wrapper {
    display: flex;
    justify-content: center;
    align-items: stretch;
    gap: 25px;
    padding: 0 30px 30px;
    flex-grow: 1;
}

/* Cards */
.info-card, .map-card {
    width: 45%;
    max-width: 600px;
    background-color: var(--bg-card);
    padding: 18px; 
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
    display: flex;
    flex-direction: column;
    height: calc(100vh - 200px); 
    min-height: 400px; 
}
.info-card h2, .map-card h2 {
    color: var(--accent-blue);
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 10px;
    margin-bottom: 12px;
    font-size: 1.6em; 
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* --- ESTILO DE LA TABLA DE DATOS --- */
.data-table {
    background-color: #333;
    padding: 10px; 
    border-radius: 4px;
    flex-grow: 1;
    overflow-y: auto; 
    max-height: 100%;
}
.data-table .status-message {
    text-align: center;
    font-size: 1.1em;
    padding: 10px;
    margin: 0;
}
.data-table .status-success {
    color: var(--accent-green);
}
.data-table .status-loading {
    color: var(--accent-blue);
}

.data-row {
    display: flex;
    border-bottom: 1px solid #3c3c3c;
    padding: 10px 5px; 
    font-family: var(--font-data);
    font-size: 1em; 
    transition: background-color 0.15s; 
}
.data-row:last-child { border-bottom: none; }
.data-row:hover { background-color: var(--highlight-row); }

/* --- ESTILOS DE PROVEEDORES --- */
.provider-tag {
    padding: 4px 8px;
    border-radius: 4px;
    color: var(--text-light); /* Texto blanco */
    font-weight: bold;
}
.provider-telmex {
    background-color: var(--color-telmex); /* Azul */
}
.provider-omnia {
    background-color: var(--color-omnia); /* Naranja */
}
/* --- FIN ESTILOS PROVEEDORES --- */

.data-label { width: 45%; font-weight: bold; color: var(--accent-blue); }
.data-value { width: 55%; color: var(--text-light); word-break: break-word; }

/* --- COORDENADAS DEBAJO DEL ID (SOLO MÓVIL) --- */
.mobile-coords {
    display: none; /* OCULTO EN ESCRITORIO */
    background-color: var(--accent-blue);
    color: white;
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 1.1em;
    font-family: var(--font-data);
    margin: 5px 0 10px 0;
    text-align: center;
    white-space: normal;
    line-height: 1.4;
}

/* Map */
#mapa {
    background-color: #000;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    flex-grow: 1;
    min-height: 150px;
}

/* MAP INFO */
#mapaInfo {
    display: flex; 
    flex-direction: column;
    background-color: #333;
    padding: 12px; 
    border-radius: 4px;
    font-size: 1em; 
    font-family: var(--font-main);
    margin-bottom: 12px; 
}
#mapaInfo:not(.visible) {
    display: none;
}


.map-footer p {
    margin: 4px 0; 
}

/* --- ESTILO DE MARCATEXTOS --- */
.highlight-text {
    font-weight: bold;
    color: white !important; 
    padding: 3px 6px; 
    border-radius: 4px; 
    line-height: 1.5; 
}
.coord-original { background-color: var(--accent-blue); }
.coord-nueva { background-color: var(--accent-red); }
#coordenadas-line p,
#coordenadas-nueva-line p {
    font-size: 1.2em; 
}
/* --- FIN ESTILO MARCATEXTOS --- */

/* --- GRUPO DE INPUT Y BOTÓN DE COMPARACIÓN --- */
.coord-input-group {
    display: flex;
    margin-top: 10px; 
    gap: 8px; 
}
#coordInput {
    padding: 10px 12px; 
    flex-grow: 1; 
    border: 1px solid var(--border-color);
    background-color: #444;
    color: var(--text-light);
    font-family: var(--font-data);
    font-size: 1em; 
    box-sizing: border-box;
}
#compararBtn {
    padding: 10px 18px; 
    background-color: #6c757d; /* <-- CAMBIO DE COLOR */
    color: white;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    font-size: 1em; 
    cursor: pointer;
    transition: background-color 0.2s, outline 0.2s, transform 0.2s; 
}
#compararBtn:hover {
    background-color: #5a6268; /* <-- CAMBIO DE COLOR (HOVER) */
    outline: 2px solid rgba(108, 117, 125, 0.7);  /* <-- CAMBIO DE OUTLINE (HOVER) */
    outline-offset: 2px;
    transform: translateY(-1px);
}

/* --- FIN GRUPO DE INPUT --- */

/* --- BOTÓN DE DISTANCIA MOVIDO AL TÍTULO --- */
#reubicacion-btn-header {
    display: none; /* Oculto por defecto */
    padding: 6px 12px; 
    background-color: var(--accent-red);
    color: white;
    border: none;
    border-radius: 4px;
    font-weight: bold;
    font-size: 0.7em; 
    cursor: default;
    align-self: flex-end;
    margin-bottom: -5px;
    transition: background-color 0.2s;
    
    text-align: center;
    line-height: 1.4;
}

/* *** MODIFICACIÓN CSS: Estilo de alerta más visible *** */
#alertaDistancia {
    display: none; /* Oculto por defecto */
    color: var(--accent-red-intense); /* Letras rojas intensas */
    background-color: var(--accent-yellow-vibrant); /* Fondo amarillo vibrante */
    font-weight: bold;
    text-align: center;
    font-size: 1em; /* Ajustado de 0.9em a 1em */
    margin: -5px 0 10px 0; 
    padding: 8px; 
    border-radius: 4px; 
}

.map-info-line {
    display: flex;
    justify-content: space-between; 
    align-items: center;
    margin: 4px 0; 
}

/* --- INICIO: ANIMACIÓN DE "PEGADO" --- */
@keyframes flash-highlight {
    from {
        /* Inicia brillante */
        background-color: var(--accent-yellow-vibrant);
        color: #1e1e1e; /* Texto oscuro para contraste */
        transform: scale(1.02); /* Un pequeño "pop" */
        border-color: var(--accent-yellow-vibrant);
    }
    to {
        /* Vuelve al color normal del input */
        background-color: #444; 
        color: var(--text-light);
        transform: scale(1.0);
        border-color: var(--border-color);
    }
}

.flash-on-paste {
    /* Ejecuta la animación "flash-highlight" durante 0.6s, una vez */
    animation: flash-highlight 0.6s ease-out 1;
}
/* --- FIN: ANIMACIÓN DE "PEGADO" --- */


/* ---------------- RESPONSIVE ADAPTIVE SIZING ---------------- */
@media (max-width: 1000px) {
    body { overflow-y: auto; }
    .content-wrapper {
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding: 0 15px 30px;
    }
    .info-card, .map-card {
        width: 100%;
        height: auto;
        min-height: auto;
    }
    .data-table { max-height: 350px; } 
    .search-input-group { flex-wrap: wrap; }
    #idInput { width: 90%; max-width: 100%; }
    .search-container button { margin: 8px 5px 0; flex-grow: 1; max-width: 45%; } 
    .coord-input-group { flex-direction: column; }
    #coordInput, #compararBtn { width: 100%; }
    .mobile-coords { display: block; }
}
@media (min-width: 1001px) {
    .mobile-coords { display: none !important; }
}
@media (max-width: 800px) {
    .data-row { font-size: 0.9em; padding: 6px 0; } 
    #mapa { min-height: 250px; } 
}
@media (max-width: 600px) {
    .header h1 { font-size: 1.8em; } 
    .data-row { font-size: 0.85em; } 
    .map-info-line { flex-direction: column; align-items: flex-start; }
}

/* --- ESTILO POP-UP OSCURO --- */
.leaflet-popup-content-wrapper {
    background-color: var(--bg-card) !important;
    color: var(--text-light) !important;
    box-shadow: 0 3px 14px rgba(0, 0, 0, 0.8);
    border-radius: 6px;
}
.leaflet-popup-tip {
    background-color: var(--bg-card) !important;
}
.leaflet-popup-content {
    font-size: 1em;
    font-family: var(--font-main);
}
.leaflet-popup-content strong {
    color: var(--text-light);
    font-weight: bold;
}
/* --- FIN ESTILO POP-UP OSCURO --- */

</style>
</head>

<body>
<header class="header">
    <h1>GEOLOCALIZADOR DE TOTEMS</h1> </header>

<div class="search-container">
    <div class="search-input-group">
        <input type="text" id="idInput" placeholder="Pega el mensaje completo de whatsapp.." onkeyup="if(event.key === 'Enter') buscarID()">
        <button onclick="buscarID()">BUSCAR ID</button>
        <button id="limpiarBtn" onclick="limpiarTodo()">LIMPIAR</button>
    </div>
</div>

<main class="content-wrapper">
    <section class="info-card">
        <h2>DATOS DEL TOTEM</h2> <div id="infoTotem" class="data-table">
            <p class="status-message status-loading">Cargando base de datos...</p>
        </div>
    </section>

    <section class="map-card">
        <h2>
            UBICACIÓN GEOGRÁFICA
            <span id="reubicacion-btn-header" style="display:none;"></span>
        </h2>
        
        <p id="alertaDistancia"></p>

        <div id="mapaInfo" class="map-footer">
            <div id="ubicacion-line" class="map-info-line">
                <p>Ubicación: [PENDIENTE]</p>
            </div>
            <div id="coordenadas-line" class="map-info-line">
                <p><span class="coord-original highlight-text">Coordenadas (Original)</span>: [PENDIENTE]</p>
            </div>
            
            <div id="coordenadas-nueva-line" class="map-info-line" style="display:none;">
                <p><span class="coord-nueva highlight-text">Coordenadas (Nuevas)</span>: [PENDIENTE]</p>
            </div>

            <div class="coord-input-group">
                <input type="text" id="coordInput" placeholder="Coordenadas de Reubicación (Lat,Lon)">
                <button id="compararBtn" onclick="compararCoordenadas()">COMPARAR</button>
            </div>
        </div>

        <div id="mapa"></div>
        
    </section>
</main>

<footer class="footer">
    </footer>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
let totemData = [], map = null, markerOriginal = null, markerNew = null, polyline = null;
let currentActiveData = null; 
let cachedNewCoordinates = null; // <-- Variable global (caché)
const DATA_URL = "https://raw.githubusercontent.com/lazerboy404/buscador-totems/main/csvjson.json";

document.addEventListener('DOMContentLoaded', async () => {
    map = L.map('mapa').setView([19.4326, -99.1332], 12); 
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="http://osm.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    await cargarDatos();
});

async function cargarDatos() {
    const info = document.getElementById('infoTotem');
    info.innerHTML = `<p class="status-message status-loading">CARGANDO BASE DE DATOS...</p>`;
    try {
        const r = await fetch(DATA_URL);
        if (!r.ok) throw new Error();
        totemData = await r.json();
        info.innerHTML = `<p class="status-message status-success">Datos cargados listo para buscar.</p>`;
    } catch {
        info.innerHTML = `<p class="status-message" style="color:red;">Error al cargar datos.</p>`;
    }
}

// Haversine formula (Función original, sin cambios)
function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; 
    const dLat = (lat2 - lat1) * (Math.PI / 180);
    const dLon = (lon2 - lon1) * (Math.PI / 180);
    const a = 
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c; // Distancia en km
}

// *** FUNCIÓN DE AYUDA REESCRITA (CON AUTOCORRECCIÓN MÁS FLEXIBLE) ***
function findAllCoordinateNumbers(text) {
    if (!text) return [];

    // Regex 1: Números con decimal (ej. -99.12345)
    const floatRegex = /-?\d+\.\d+/g;
    // Regex 2: Enteros largos (7-11 dígitos) que *probablemente* son coords sin punto
    const intRegex = /-?\d{7,11}/g; // <-- LÍMITE INFERIOR ES 7

    // Buscar todos los números que coincidan con CUALQUIERA de las regex
    const allMatches = text.match(new RegExp(floatRegex.source + '|' + intRegex.source, 'g')) || [];

    // Ahora, procesar los resultados para "corregir" los que no tienen punto
    const correctedNumbers = allMatches.map(num => {
        // Si ya tiene punto, está bien.
        if (num.includes('.')) {
            return num;
        }

        // --- INICIO DE LA AUTOCORRECCIÓN ---
        
        // Caso Longitud: Empieza con -9, -1, etc. (ej. -9912825)
        if (num.startsWith('-') && (num.startsWith('-9') || num.startsWith('-1'))) {
            if (num.length >= 8) { // (ej. -9912345)
                // Inserta el punto después de los 3 primeros caracteres: -99.
                return num.substring(0, 3) + '.' + num.substring(3);
            }
        }
        
        // Caso Latitud: Empieza con 1, 2, etc. (ej. 1912345)
        if (!num.startsWith('-') && (num.startsWith('1') || num.startsWith('2'))) {
             if (num.length >= 7) { // (ej. 1912345)
                // Inserta el punto después de los 2 primeros caracteres: 19.
                return num.substring(0, 2) + '.' + num.substring(2);
            }
        }
        
        // Si es un entero que no reconocemos, lo descartamos.
        return null;

    }).filter(Boolean); // Elimina cualquier 'null' que hayamos devuelto

    return correctedNumbers;
}


// === FUNCIÓN BUSCAR ID (MODIFICADA CON LÓGICA ROBUSTA) ===
function buscarID() {
    // --- EXTRACCIÓN DE ID ---
    const idInput = document.getElementById('idInput');
    const rawIdText = idInput.value;
    let id = '';
    const idRegex = /MC\d+/i;
    const idMatch = rawIdText.match(idRegex);

    if (idMatch) {
        id = idMatch[0].toUpperCase();
    } else {
        id = rawIdText.trim().toUpperCase();
    }
    idInput.value = id; 
    
    const info = document.getElementById('infoTotem');
    const coordInput = document.getElementById('coordInput');
    
    // --- LÓGICA DE CACHÉ ---
    cachedNewCoordinates = null; 
    let firstCoordsStr = null;
    
    const newCoordMarkers = /NUEVAS COORDENADAS|REUBICACIÓN|UBICACIÓN SUGERIDA/i;
    const newMatch = rawIdText.match(newCoordMarkers);
    
    let textForFirstSearch = rawIdText;
    let textForNewSearch = null;

    if (newMatch) {
        textForFirstSearch = rawIdText.substring(0, newMatch.index);
        textForNewSearch = rawIdText.substring(newMatch.index);
        
        const newNumbers = findAllCoordinateNumbers(textForNewSearch);
        if (newNumbers.length >= 2) {
            cachedNewCoordinates = [newNumbers[0], newNumbers[1]];
        }
    }

    const firstNumbers = findAllCoordinateNumbers(textForFirstSearch);
    if (firstNumbers.length >= 2) {
        firstCoordsStr = `${firstNumbers[0]}, ${firstNumbers[1]}`; 
    }
    
    coordInput.value = firstCoordsStr || '';
    // --- FIN LÓGICA DE CACHÉ ---

    limpiarMapa(false); 
    currentActiveData = null; 

    if (!id) { info.innerHTML = `<p class="status-message">Ingrese un ID.</p>`; return; }
    
    let normalizedId = id;
    if (!id.startsWith('MC')) {
        normalizedId = 'MC' + id;
    }
    const searchId = normalizedId; 
    
    const data = totemData.find(d => d.ID === searchId || d.id === searchId);
    
    if (!data) {
        info.innerHTML = `<p class="status-message" style="color:red;">ID ${id} no encontrado.</p>`;
        document.getElementById('mapaInfo').classList.remove('visible'); 
        actualizarInfoMapa(null, null, null, null, 0); 
        return;
    }
    
    currentActiveData = data; 
    document.getElementById('mapaInfo').classList.add('visible'); 
    
    mostrarInformacion(data, info); 
    
    const finalCoordsToMap = document.getElementById('coordInput').value.trim();
    actualizarMapa(data, finalCoordsToMap || null); 
}


// === FUNCIÓN COMPARAR COORDENADAS (MODIFICADA CON ANIMACIÓN) ===
function compararCoordenadas() {
    if (!currentActiveData) {
        document.getElementById('infoTotem').innerHTML = `<p class="status-message" style="color:red;">Error: Busque un ID primero.</p>`;
        return;
    }
    
    const coordInput = document.getElementById('coordInput'); // <--- 1. Obtener el elemento
    let coordsStrToCompare = null;

    if (cachedNewCoordinates && cachedNewCoordinates.length === 2) {
        coordsStrToCompare = `${cachedNewCoordinates[0]}, ${cachedNewCoordinates[1]}`;
        coordInput.value = coordsStrToCompare; 
        cachedNewCoordinates = null; 
        
        // --- ¡INICIO DE LA ANIMACIÓN! ---
        coordInput.classList.remove('flash-on-paste'); // <--- 2. Limpiar animación anterior
        void coordInput.offsetWidth; // <--- 3. Forzar repintado del navegador (truco)
        coordInput.classList.add('flash-on-paste'); // <--- 4. Aplicar animación
        // --- FIN DE LA ANIMACIÓN ---
    
    } else {
        const rawCoordText = coordInput.value;
        const numbersInInput = findAllCoordinateNumbers(rawCoordText);
        
        if (numbersInInput.length >= 2) {
            coordsStrToCompare = `${numbersInInput[0]}, ${numbersInInput[1]}`;
            coordInput.value = coordsStrToCompare;
        } else {
            coordInput.value = '';
        }
    }
    
    limpiarMarcadoresYPolilinea(); 
    mostrarInformacion(currentActiveData, document.getElementById('infoTotem'));
    actualizarMapa(currentActiveData, coordsStrToCompare);
}

// (Función original, sin cambios)
function limpiarTodo() {
    document.getElementById('idInput').value = '';
    document.getElementById('coordInput').value = '';
    cachedNewCoordinates = null; // Limpiar caché
    
    limpiarMapa(true); 
    document.getElementById('infoTotem').innerHTML = `<p class="status-message status-success">Datos cargados listo para buscar.</p>`;
    document.getElementById('mapaInfo').classList.remove('visible'); 
}

// (Función original, sin cambios)
function limpiarMarcadoresYPolilinea() {
    if (markerNew) map.removeLayer(markerNew);
    if (polyline) map.removeLayer(polyline);
    markerNew = null;
    polyline = null;
    
    document.getElementById('reubicacion-btn-header').style.display = 'none'; 
    document.getElementById('alertaDistancia').style.display = 'none'; 
    
    if (currentActiveData) {
        const ubicacion = `${currentActiveData.COLONIA || 'N/A'}, ${currentActiveData.ALCALDIA || 'N/A'}`;
        const orig_coords_str = `${(currentActiveData.LATITUD || currentActiveData.latitud || currentActiveData.Latitude).toFixed(6)}, ${(currentActiveData.LONGITUD || currentActiveData.longitud || currentActiveData.Longitude).toFixed(6)}`;
        actualizarInfoMapa(ubicacion, orig_coords_str, null, "0 m", 0); 
    }

    if (markerOriginal) {
         markerOriginal.openPopup();
    }
}

// (Función original, sin cambios)
function limpiarMapa(clearInputs = false) {
    if (markerOriginal) map.removeLayer(markerOriginal);
    if (markerNew) map.removeLayer(markerNew);
    if (polyline) map.removeLayer(polyline);
    markerOriginal = null;
    markerNew = null;
    polyline = null;
    currentActiveData = null;
    
    document.getElementById('reubicacion-btn-header').style.display = 'none'; 
    document.getElementById('alertaDistancia').style.display = 'none'; 
    
    if (clearInputs) {
        actualizarInfoMapa("PENDIENTE", "PENDIENTE", null, null, 0); 
    } else {
        actualizarInfoMapa("PENDIENTE", "PENDIENTE", null, null, 0); 
        map.setView([19.4326, -99.1332], 12);
    }
}

// (Función original, sin cambios)
function actualizarInfoMapa(ubicacion, orig_coords, new_coords, distancia, distanceM) {
    const ubicacionLine = document.getElementById('ubicacion-line');
    const coordenadasLine = document.getElementById('coordenadas-line');
    const coordNuevaLine = document.getElementById('coordenadas-nueva-line');
    const btnHeader = document.getElementById('reubicacion-btn-header');
    
    const alertaDistancia = document.getElementById('alertaDistancia');
    alertaDistancia.style.display = 'none'; 

    ubicacionLine.innerHTML = `<p>Ubicación: ${ubicacion || '[NO ENCONTRADA]'}</p>`;
    coordenadasLine.innerHTML = `<p><span class="coord-original highlight-text">Coordenadas (Original)</span>: ${orig_coords || '[NO ENCONTRADA]'}</p>`;
    
    if (new_coords) {
        coordNuevaLine.innerHTML = `<p><span class="coord-nueva highlight-text">Coordenadas (Nuevas)</span>: ${new_coords}</p>`;
        coordNuevaLine.style.display = 'flex'; 
    } else {
        coordNuevaLine.style.display = 'none'; 
    }
    
    if (new_coords) {
        if (distanceM <= 8) {
            btnHeader.innerHTML = `UBICACIÓN COINCIDE<br>${distancia}`; 
            btnHeader.style.backgroundColor = 'var(--accent-green)'; 
            btnHeader.style.display = 'inline-block';
        } else {
            btnHeader.innerHTML = `REUBICACIÓN: ${distancia}`; 
            btnHeader.style.backgroundColor = 'var(--accent-red)'; 
            btnHeader.style.display = 'inline-block';

            if (distanceM > 100) {
                alertaDistancia.textContent = '☠️ ¡Atención! La distancia excede los 100 metros permitidos. ☠️';
                alertaDistancia.style.display = 'block';
            }
        }
    } else {
        btnHeader.style.display = 'none'; 
    }
    
    const infoTotem = document.getElementById('infoTotem');
    let mobileCoordDiv = infoTotem.querySelector('.mobile-coords');
    if (!mobileCoordDiv) {
        mobileCoordDiv = document.createElement('div');
        mobileCoordDiv.className = 'mobile-coords';
        infoTotem.insertBefore(mobileCoordDiv, infoTotem.firstChild); 
    }
    if (orig_coords && orig_coords !== "PENDIENTE") {
        mobileCoordDiv.innerHTML = `Coordenadas:<br>${orig_coords}`; 
        mobileCoordDiv.style.display = 'block'; 
    } else {
        mobileCoordDiv.style.display = 'none';
    }
}


// === FUNCIÓN MOSTRAR INFORMACIÓN (CORREGIDA) ===
function mostrarInformacion(data, cont) {
    let html = '';
    
    const excl = ['LATITUD','LONGITUD','latitud','longitud','Latitude','Longitude'];
    
    for (const k in data) {
        if (excl.includes(k)) continue; 
        
        const key = k.toUpperCase().trim();
        const value = String(data[k]);
        let displayValue = value; 
        
        if (key.includes('PROVEEDOR') || key === 'TIPO') {
            const upperValue = value.toUpperCase().trim();
            
            if (upperValue === 'TELMEX') {
                displayValue = `<span class="provider-tag provider-telmex">${value}</span>`;
            } else if (upperValue === 'OMNIA') {
                displayValue = `<span class="provider-tag provider-omnia">${value}</span>`;
            }
        }
        
        // ¡Este es el error que corregí!
        html += `<div class="data-row">
            <div class="data-label">${k.replace('_',' ')}</div>
            <div class="data-value">${displayValue}</div></div>`;
    }
    
    const mobileCoordDiv = cont.querySelector('.mobile-coords');
    cont.innerHTML = html;
    if (mobileCoordDiv) {
        cont.insertBefore(mobileCoordDiv, cont.firstChild);
    }
}

// === FUNCIÓN ACTUALIZAR MAPA (¡CON CAMBIO DE POPUP!) ===
function actualizarMapa(d, coordsStr) {
    const orig_lat = parseFloat(d.LATITUD || d.latitud || d.Latitude);
    const orig_lon = parseFloat(d.LONGITUD || d.longitud || d.Longitude);
    
    const activoID = d.ID || d.id || 'N/A';
    
    const ubicacion = `${d.COLONIA || 'N/A'}, ${d.ALCALDIA || 'N/A'}`;
    const orig_coords_str = `${orig_lat.toFixed(6)}, ${orig_lon.toFixed(6)}`;
    let new_coords_str = null;
    let distanceDisplay = "0 m";
    let distanceM = 0; 

    if (isNaN(orig_lat) || isNaN(orig_lon)) { 
        actualizarInfoMapa(ubicacion, "N/A", null, null, 0); 
        return; 
    }

    if (!markerOriginal) {
        const blueIcon = new L.Icon({
            iconUrl: 'https://unpkg.com/leaflet/dist/images/marker-icon.png',
            shadowUrl: 'https://unpkg.com/leaflet/dist/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        markerOriginal = L.marker([orig_lat, orig_lon], { icon: blueIcon })
            .addTo(map)
            .bindPopup(`<strong>${activoID}</strong><br><span style="color: #007bff;">UBICACIÓN ORIGINAL</span><br>${orig_coords_str}`)
            .openPopup();
         map.setView([orig_lat, orig_lon], 15);
    }
    
    let bounds = [ [orig_lat, orig_lon] ];
    let focusPoint = [orig_lat, orig_lon];

    if (coordsStr) {
        // Lógica de extracción de números (robusta)
        const numberRegex = new RegExp(/-?\d+(\.\d+)?/g);
        const parts = coordsStr.match(numberRegex);
        
        if (parts && parts.length === 2) {
            // ¡LOS NÚMEROS AHORA VIENEN CORREGIDOS!
            const new_lat = parseFloat(parts[0]);
            const new_lon = parseFloat(parts[1]);

            if (!isNaN(new_lat) && !isNaN(new_lon)) {
                
                // --- Cálculo de distancia (se mueve aquí para decidir el pin) ---
                const distanceKm = getDistance(orig_lat, orig_lon, new_lat, new_lon);
                distanceM = distanceKm * 1000;
                distanceDisplay = distanceKm < 1 ? `${distanceM.toFixed(2)} m` : `${distanceKm.toFixed(2)} km`; 

                // --- ¡INICIO DE LA NUEVA LÓGICA DE POPUP! ---
                let popupColor = 'var(--accent-red)'; // Default: #dc3545
                let popupText = 'NUEVA UBICACIÓN';
                let markerIconUrl = 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png';

                if (distanceM <= 8) {
                    popupColor = 'var(--accent-green)'; // Green: #28a745
                    popupText = 'UBICACIÓN COINCIDE';
                    markerIconUrl = 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png'; // Pin Verde
                }
                // --- FIN DE LA NUEVA LÓGICA DE POPUP! ---

                const newIcon = new L.Icon({
                    iconUrl: markerIconUrl,
                    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
                    iconSize: [25, 41],
                    iconAnchor: [12, 41],
                    popupAnchor: [1, -34],
                    shadowSize: [41, 41]
                });
                
                new_coords_str = `${new_lat.toFixed(6)}, ${new_lon.toFixed(6)}`;

                markerNew = L.marker([new_lat, new_lon], { icon: newIcon }) // <-- Usa el nuevo icono
                    .addTo(map)
                    .bindPopup(`<strong>${activoID}</strong><br><span style="color: ${popupColor};">${popupText}</span><br>${new_coords_str}`) // <-- Usa las variables
                    .openPopup();
                
                const latlngs = [ [orig_lat, orig_lon], [new_lat, new_lon] ];
                polyline = L.polyline(latlngs, {color: 'red', weight: 4, opacity: 0.7}).addTo(map);

                bounds.push([new_lat, new_lon]);
                map.fitBounds(bounds, { padding: [50, 50] });
                focusPoint = null; 
            }
        }
    } else {
        // Si no hay coordsStr, solo limpia los marcadores nuevos
        limpiarMarcadoresYPolilinea(); 
        if (markerOriginal) {
            map.setView([orig_lat, orig_lon], 15);
        }
    }

    // --- Llamada a actualizarInfoMapa (sección clave) ---
    actualizarInfoMapa(ubicacion, orig_coords_str, new_coords_str, distanceDisplay, distanceM);
    
    setTimeout(() => map.invalidateSize(), 100);
}
</script>
